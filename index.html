<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>File Box Label Maker</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans Bengali', Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 16px;
    color: #1a1a1a;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 16px; }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  button {
    background: #2b6cb0;
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary { background: #555; }
  button.danger { background: #c0392b; }
  button.green { background: #2e7d32; }
  button:hover { opacity: 0.9; }

  .layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .formPane {
    flex: 1;
    min-width: 320px;
  }
  .previewPane {
    flex: 1;
    min-width: 320px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .card-head strong { font-size: 14px; }
  .field-row { margin-bottom: 8px; }
  .field-row label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 3px;
  }
  .field-row input, .field-row textarea, .field-row select {
    width: 100%;
    padding: 7px 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 13px;
    font-family: inherit;
  }
  .check-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .check-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }

  .colorRow { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .colorRow input[type=color] { width: 36px; height: 28px; border: none; padding: 0; }

  /* ---- Label preview (on screen) ---- */
  #previewArea {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: #fff;
    padding: 12px;
    border-radius: 10px;
  }
  .label-strip {
    width: var(--label-w, 60mm);
    height: var(--label-h, 283mm);
    max-height: 380px; /* screen scaled */
    border: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #1c1c1c;
    color: #fff;
    font-size: 11px;
    transform-origin: top left;
  }
  .label-header {
    padding: 10px 4px;
    text-align: center;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 0.5px;
    line-height: 1.25;
  }
  .label-section {
    flex: 1;
    border-top: 1px solid rgba(255,255,255,0.25);
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .label-section .lbl-title {
    font-size: 9px;
    opacity: 0.65;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .label-section .lbl-val {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.25;
  }
  .label-footer {
    padding: 4px;
    text-align: center;
    font-size: 9px;
    opacity: 0.75;
  }

  /* ---- Print styles ---- */
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }
    .print-page {
      width: 210mm;
      height: 297mm;
      display: flex;
      flex-direction: row;
      justify-content: space-evenly;
      align-items: stretch;
      page-break-after: always;
      padding: 6mm;
    }
    .print-page:last-child { page-break-after: auto; }
    .print-label {
      width: var(--label-w, 60mm);
      height: var(--label-h, 283mm);
      border: 0.5px solid #000;
      display: flex;
      flex-direction: column;
      color: #fff !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
  #printArea { display: none; }
</style>
</head>
<body>

<h1>📦 File Box Label Maker</h1>
<div class="sub">Customize fields for each label — prints 3 vertical strip labels per A4 page.</div>
<div id="saveIndicator" style="font-size:12px; color:#2e7d32; opacity:0.5; margin-bottom:8px;">Autosave is on — your work stays saved in this browser until you delete it.</div>

<div class="toolbar">
  <button onclick="addLabel()">➕ Add New Label</button>
  <button class="green" onclick="window.print()">🖨️ Print / Save as PDF</button>
  <button class="secondary" onclick="exportJSON()">⬇️ Backup (JSON)</button>
  <button class="secondary" onclick="document.getElementById('importFile').click()">⬆️ Import Backup</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="danger" onclick="clearAll()">🗑️ Clear All</button>
</div>

<div class="card" style="max-width:420px;">
  <strong style="font-size:13px;">📐 Label Size (applies to all labels)</strong>
  <div style="display:flex; gap:12px; margin-top:8px;">
    <div style="flex:1;">
      <label style="display:block;font-size:12px;color:#555;margin-bottom:3px;">Width (mm)</label>
      <input type="number" id="globalWidth" value="60" min="20" max="200" oninput="updateGlobalSize()">
    </div>
    <div style="flex:1;">
      <label style="display:block;font-size:12px;color:#555;margin-bottom:3px;">Height (mm)</label>
      <input type="number" id="globalHeight" value="283" min="40" max="297" oninput="updateGlobalSize()">
    </div>
    <div style="flex:1;display:flex;align-items:flex-end;">
      <button class="secondary" style="width:100%;" onclick="resetGlobalSize()">Reset Default</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="formPane" id="formPane"></div>
  <div class="previewPane">
    <strong style="font-size:13px;">Preview (3 labels print together per page)</strong>
    <div id="previewArea" style="margin-top:8px;"></div>
  </div>
</div>

<div id="printArea"></div>

<script>
let labels = [];
let idCounter = 0;

const FIELD_DEFS = [
  { key: "dept", title: "Department / Section" },
  { key: "contents", title: "Box Contents" },
  { key: "month", title: "Month" },
  { key: "dateRange", title: "Date Range (From - To)" },
  { key: "refNo", title: "Reference / Box Number" },
  { key: "notes", title: "Notes" },
];

function newLabel() {
  idCounter++;
  return {
    id: idCounter,
    headerText: "Mohammed Abdallah Sharbatly Co. CJS.",
    headerSubText: "Jeddah",
    bgColor: "#1c1c1c",
    accentColor: "#3fae6a",
    headerSize: 16,
    titleSize: 9,
    valueSize: 15,
    show: { dept: true, contents: true, month: true, dateRange: false, refNo: true, notes: false },
    values: { dept: "", contents: "", month: "", dateRange: "", refNo: "", notes: "" }
  };
}

function updateGlobalSize() {
  const w = document.getElementById('globalWidth').value || 60;
  const h = document.getElementById('globalHeight').value || 283;
  document.documentElement.style.setProperty('--label-w', w + 'mm');
  document.documentElement.style.setProperty('--label-h', h + 'mm');
  saveToStorage();
}

function resetGlobalSize() {
  document.getElementById('globalWidth').value = 60;
  document.getElementById('globalHeight').value = 283;
  updateGlobalSize();
}

function addLabel() {
  labels.push(newLabel());
  render();
  saveToStorage();
}

function removeLabel(id) {
  labels = labels.filter(l => l.id !== id);
  render();
  saveToStorage();
}

function updateField(id, key, val) {
  const l = labels.find(x => x.id === id);
  if (!l) return;
  l.values[key] = val;
  renderPreviewOnly();
  saveToStorage();
}

function updateFontSize(id, key, val) {
  const l = labels.find(x => x.id === id);
  if (!l) return;
  l[key] = val;
  const labelMap = { headerSize: 'hsLabel-', titleSize: 'tsLabel-', valueSize: 'vsLabel-' };
  const textMap = { headerSize: 'Header Text Size', titleSize: 'Field Title Size', valueSize: 'Value Text Size' };
  const labelEl = document.getElementById(labelMap[key] + id);
  if (labelEl) labelEl.textContent = `${textMap[key]}: ${val}px`;
  renderPreviewOnly();
  renderPrintArea();
  saveToStorage();
}

function updateMeta(id, key, val) {
  const l = labels.find(x => x.id === id);
  if (!l) return;
  l[key] = val;
  render();
  saveToStorage();
}

function toggleShow(id, key, checked) {
  const l = labels.find(x => x.id === id);
  if (!l) return;
  l.show[key] = checked;
  render();
  saveToStorage();
}

function render() {
  renderForm();
  renderPreviewOnly();
  renderPrintArea();
}

function renderForm() {
  const pane = document.getElementById('formPane');
  if (labels.length === 0) {
    pane.innerHTML = '<div class="card">No labels yet. Click "Add New Label" to start.</div>';
    return;
  }
  pane.innerHTML = labels.map((l, idx) => `
    <div class="card">
      <div class="card-head">
        <strong>Label #${idx + 1}</strong>
        <button class="danger" style="padding:4px 10px;font-size:12px;" onclick="removeLabel(${l.id})">Remove</button>
      </div>

      <div class="field-row">
        <label>Header Title (e.g. Brand/Company Name)</label>
        <input type="text" value="${escapeHtml(l.headerText)}" oninput="updateMeta(${l.id}, 'headerText', this.value)">
      </div>

      <div class="field-row">
        <label>Header Subtitle (e.g. City)</label>
        <input type="text" value="${escapeHtml(l.headerSubText)}" oninput="updateMeta(${l.id}, 'headerSubText', this.value)">
      </div>

      <div class="colorRow">
        <label style="font-size:12px;">Background:</label>
        <input type="color" value="${l.bgColor}" oninput="updateMeta(${l.id}, 'bgColor', this.value)">
        <label style="font-size:12px;">Accent:</label>
        <input type="color" value="${l.accentColor}" oninput="updateMeta(${l.id}, 'accentColor', this.value)">
      </div>

      <div class="field-row">
        <label id="hsLabel-${l.id}">Header Text Size: ${l.headerSize}px</label>
        <input type="range" min="8" max="30" value="${l.headerSize}" oninput="updateFontSize(${l.id}, 'headerSize', parseInt(this.value))">
      </div>
      <div class="field-row">
        <label id="tsLabel-${l.id}">Field Title Size: ${l.titleSize}px</label>
        <input type="range" min="6" max="20" value="${l.titleSize}" oninput="updateFontSize(${l.id}, 'titleSize', parseInt(this.value))">
      </div>
      <div class="field-row">
        <label id="vsLabel-${l.id}">Value Text Size: ${l.valueSize}px</label>
        <input type="range" min="8" max="30" value="${l.valueSize}" oninput="updateFontSize(${l.id}, 'valueSize', parseInt(this.value))">
      </div>

      <div class="check-row">
        ${FIELD_DEFS.map(f => `
          <label>
            <input type="checkbox" ${l.show[f.key] ? 'checked' : ''} onchange="toggleShow(${l.id}, '${f.key}', this.checked)">
            ${f.title}
          </label>
        `).join('')}
      </div>

      ${FIELD_DEFS.filter(f => l.show[f.key]).map(f => `
        <div class="field-row">
          <label>${f.title}</label>
          ${f.key === 'notes' || f.key === 'contents'
            ? `<textarea rows="2" oninput="updateField(${l.id}, '${f.key}', this.value)">${escapeHtml(l.values[f.key])}</textarea>`
            : `<input type="text" value="${escapeHtml(l.values[f.key])}" oninput="updateField(${l.id}, '${f.key}', this.value)">`
          }
        </div>
      `).join('')}
    </div>
  `).join('');
}

function buildLabelInner(l) {
  const sections = FIELD_DEFS.filter(f => l.show[f.key] && l.values[f.key]);
  return `
    <div class="label-header" style="background:${l.accentColor}; font-size:${l.headerSize}px;">
      ${escapeHtml(l.headerText)}
      ${l.headerSubText ? `<div style="font-size:${Math.round(l.headerSize * 0.65)}px; font-weight:500; margin-top:2px; opacity:0.9;">${escapeHtml(l.headerSubText)}</div>` : ''}
    </div>
    ${sections.map(f => `
      <div class="label-section">
        <div class="lbl-title" style="font-size:${l.titleSize}px;">${f.title}</div>
        <div class="lbl-val" style="font-size:${l.valueSize}px;">${escapeHtml(l.values[f.key])}</div>
      </div>
    `).join('')}
    <div class="label-footer">File Box Label</div>
  `;
}

function renderPreviewOnly() {
  const area = document.getElementById('previewArea');
  if (labels.length === 0) {
    area.innerHTML = '<div style="color:#999;font-size:13px;">Add a label to see the preview here.</div>';
    return;
  }
  area.innerHTML = labels.map(l => `
    <div class="label-strip" style="background:${l.bgColor};">
      ${buildLabelInner(l)}
    </div>
  `).join('');
}

function renderPrintArea() {
  const printArea = document.getElementById('printArea');
  if (labels.length === 0) { printArea.innerHTML = ''; return; }
  let pages = [];
  for (let i = 0; i < labels.length; i += 3) {
    pages.push(labels.slice(i, i + 3));
  }
  printArea.innerHTML = pages.map(pageLabels => `
    <div class="print-page">
      ${pageLabels.map(l => `
        <div class="print-label" style="background:${l.bgColor};">
          ${buildLabelInner(l)}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(labels, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'file_box_labels_backup.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (Array.isArray(data)) {
        labels = data;
        idCounter = Math.max(0, ...labels.map(l => l.id || 0)) + 1;
        render();
        saveToStorage();
        alert('Backup loaded successfully!');
      } else {
        alert('Invalid file format.');
      }
    } catch (err) {
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAll() {
  if (confirm('Clear all labels? This cannot be undone.')) {
    labels = [];
    render();
    saveToStorage();
  }
}

// ---- Autosave (browser localStorage) ----
const STORAGE_KEY = 'fileBoxLabelMaker_data_v1';
let saveTimer = null;

function saveToStorage() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      const payload = {
        labels: labels,
        idCounter: idCounter,
        globalWidth: document.getElementById('globalWidth') ? document.getElementById('globalWidth').value : 60,
        globalHeight: document.getElementById('globalHeight') ? document.getElementById('globalHeight').value : 283
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      showSavedIndicator();
    } catch (err) {
      console.error('Autosave failed:', err);
    }
  }, 300);
}

function showSavedIndicator() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.textContent = '✅ Saved — ' + new Date().toLocaleTimeString();
  el.style.opacity = '1';
  clearTimeout(showSavedIndicator._t);
  showSavedIndicator._t = setTimeout(() => { el.style.opacity = '0.5'; }, 1500);
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const payload = JSON.parse(raw);
    if (!payload || !Array.isArray(payload.labels)) return false;
    labels = payload.labels;
    idCounter = payload.idCounter || (Math.max(0, ...labels.map(l => l.id || 0)) + 1);
    if (payload.globalWidth) document.getElementById('globalWidth').value = payload.globalWidth;
    if (payload.globalHeight) document.getElementById('globalHeight').value = payload.globalHeight;
    updateGlobalSize();
    return true;
  } catch (err) {
    console.error('Load failed:', err);
    return false;
  }
}

// ---- init ----
const restored = loadFromStorage();
if (!restored) {
  labels.push(Object.assign(newLabel(), {
    headerText: "Mohammed Abdallah Sharbatly Co. CJS.",
    headerSubText: "Jeddah",
    values: { dept: "HR Department", contents: "Employee EOS Files A-M", month: "January 2026", dateRange: "", refNo: "BOX-001", notes: "" }
  }));
}
render();
</script>
</body>
</html>
